<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hnin Shop - Professional UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #FF9500; --bg: #0c0c0c; --card: #181818; --qr-bg: #222; --accent: #00d2ff; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s ease-out; }
        .loader { width: 48px; height: 48px; border: 5px solid #333; border-bottom-color: var(--primary); border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .lang-btn { cursor: pointer; border-radius: 4px; width: 28px; height: 18px; object-fit: cover; border: 1.5px solid #444; transition: 0.3s; }
        .lang-btn.active { border-color: var(--primary); transform: scale(1.1); box-shadow: 0 0 10px var(--primary); }
        
        .top-nav { background: #111; padding-bottom: 10px; border-bottom: 1px solid #222; position: sticky; top: 55px; z-index: 999; }
        .search-area { padding: 10px 15px; }
        .search-bar { width: 100%; padding: 12px 15px; border-radius: 25px; border: 1px solid #333; background: var(--card); color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }

        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 5px 15px 10px; scrollbar-width: none; }
        .cat-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid #333; background: #111; color: #888; font-size: 12px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: #000; font-weight: bold; border-color: var(--primary); transform: scale(1.05); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: var(--card); padding: 10px; border-radius: 18px; border: 1px solid #222; transition: 0.3s; position: relative; overflow: hidden; animation: fadeIn 0.6s ease; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; background: #000; border-radius: 12px; }
        .price-tag { color: var(--primary); font-weight: bold; font-size: 14px; margin: 5px 0 10px; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
        .modal-content { background: #111; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; border: 1px solid #333; max-height: 85vh; overflow-y: auto; position: relative; animation: slideUp 0.4s ease; }
        
        .form-input { width: 100%; padding: 14px; margin-bottom: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; outline: none; }
        .buy-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; font-size: 15px; }

        #customAlert { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); 
            background: #222; color: #fff; padding: 12px 25px; border-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 10001; transition: 0.5s;
            border: 1px solid var(--primary); font-size: 14px; display: flex; align-items: center; gap: 10px; pointer-events: none;
        }
        #customAlert.show { transform: translateX(-50%) translateY(0); }

        .slider-wrapper { position: relative; width: 100%; }
        .slider-container { width: 100%; overflow-x: auto; display: flex; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; border-radius: 18px; background: #000; }
        .slider-container img { min-width: 100%; aspect-ratio: 1/1; object-fit: contain; scroll-snap-align: start; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; width: 35px; height: 35px; cursor: pointer; font-size: 20px; z-index: 10; border-radius: 50%; }

        .opt-item { padding: 8px 15px; background: #222; border-radius: 8px; display: inline-block; margin: 4px; font-size: 12px; border: 1px solid #333; cursor: pointer; }
        .opt-item.active { background: var(--primary); color: #000; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="customAlert"><span id="alertMsg"></span></div>

<div id="splash">
    <div class="loader"></div>
    <p style="margin-top: 20px; font-weight: 600; color: var(--primary);">HNIN SHOP</p>
</div>

<header>
    <b id="ui-brand">နှင်း အွန်လိုင်းရှော့</b>
    <div style="display:flex; gap:10px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Flag_of_Myanmar.svg" class="lang-btn active" id="btn-mm" onclick="setLang('mm')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Flag_of_the_United_Kingdom_%281-2%29.svg" class="lang-btn" id="btn-en" onclick="setLang('en')">
    </div>
</header>

<div class="top-nav">
    <div class="search-area"><input type="text" class="search-bar" id="search" placeholder="ရှာဖွေရန်..." onkeyup="render()"></div>
    <div class="category-bar" id="ui-cat-bar">
        </div>
</div>

<div class="grid" id="productGrid"></div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="slider-wrapper">
            <button class="nav-btn" style="left:8px;" onclick="moveSlider(-1)">‹</button>
            <div id="slider" class="slider-container"></div>
            <button class="nav-btn" style="right:8px;" onclick="moveSlider(1)">›</button>
        </div>
        <h2 id="detTitle" style="margin-top:15px; font-size: 18px;"></h2>
        <div id="detPrice" style="color:var(--primary); font-weight:bold; font-size:20px;"></div>
        <div id="detDesc" style="margin:10px 0; font-size:14px; color:#ccc;"></div>
        <div id="ui-size-label" style="font-size:12px; color:var(--primary); margin-top:10px;"></div>
        <div id="sizeGroup" style="margin-bottom:15px;"></div>
        <div id="ui-color-label" style="font-size:12px; color:var(--primary);"></div>
        <div id="colorGroup" style="margin-bottom:15px;"></div>
        <button class="buy-btn" id="ui-continue-btn" onclick="openOrder()"></button>
        <button onclick="closeModal('detailModal')" id="ui-close-btn" style="width:100%; background:none; border:none; color:#666; margin-top:10px;"></button>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3 id="ui-order-title" style="text-align:center; color:var(--primary);"></h3>
        <input type="text" id="orderName" class="form-input">
        <input type="number" id="orderPhone" class="form-input">
        <textarea id="orderAddress" class="form-input"></textarea>
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button id="payK" onclick="selectPay('KPay')" style="flex:1; padding:10px; background:#222; color:#fff; border:1px solid #444; border-radius:8px;">KPay</button>
            <button id="payW" onclick="selectPay('Wave')" style="flex:1; padding:10px; background:#222; color:#fff; border:1px solid #444; border-radius:8px;">Wave</button>
        </div>
        
        <div id="qrSection" style="text-align:center; display:none; margin-bottom:15px; background:#1a1a1a; padding:15px; border-radius:15px;">
            <img id="qrImg" style="width:180px; border-radius:10px; border:2px solid var(--primary);">
        </div>

        <input type="file" id="slipFile" style="display:none;" onchange="showMsg(curLang==='mm'?'Slip ရွေးပြီးပါပြီ':'Slip Selected')">
        <button class="buy-btn" id="ui-upload-btn" style="background:#333; color:#fff; margin-bottom:10px;" onclick="document.getElementById('slipFile').click()"></button>
        <button class="buy-btn" id="ui-submit-btn" onclick="sendOrder()"></button>
        <button onclick="closeModal('orderModal')" id="ui-back-btn" style="width:100%; background:none; border:none; color:#666; margin-top:10px;"></button>
    </div>
</div>

<script>
    const translations = {
        mm: {
            brand: "နှင်း အွန်လိုင်းရှော့", search: "ရှာဖွေရန်...", cats: ["အားလုံး", "တီရှပ်", "ဟူဒီ", "တခြား"],
            buy: "ဝယ်ယူမည်", size: "ဆိုဒ် ရွေးချယ်ပါ -", color: "အရောင် ရွေးချယ်ပါ -", continue: "ဝယ်ယူရန် ဆက်သွားမည်", 
            close: "ပိတ်မည်", orderTitle: "လိပ်စာဖြည့်ပါ", name: "အမည်", phone: "ဖုန်းနံပါတ်", addr: "လိပ်စာ", 
            upload: "Slip တင်ပါ", submit: "အော်ဒါတင်မည်", back: "နောက်သို့", 
            selectErr: "ဆိုဒ်နှင့် အရောင် ရွေးပါ", fillErr: "အချက်အလက် အကုန်ဖြည့်ပါ", success: "အောင်မြင်ပါသည်"
        },
        en: {
            brand: "HNIN ONLINE SHOP", search: "Search...", cats: ["All", "T-Shirt", "Hoodie", "Other"],
            buy: "Buy Now", size: "Select Size -", color: "Select Color -", continue: "Continue to Order", 
            close: "Close", orderTitle: "Delivery Address", name: "Name", phone: "Phone Number", addr: "Address", 
            upload: "Upload Slip", submit: "Confirm Order", back: "Back", 
            selectErr: "Please select size and color", fillErr: "Please fill all info", success: "Order Success"
        }
    };

    let curLang = 'mm';
    let prods = {}, curCat = "All", selItem = null, selS = "", selC = "", selP = "";

    function setLang(lang) {
        curLang = lang;
        const t = translations[lang];
        
        // Header & Search
        document.getElementById('ui-brand').innerText = t.brand;
        document.getElementById('search').placeholder = t.search;
        
        // Language Buttons
        document.getElementById('btn-mm').classList.toggle('active', lang === 'mm');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');

        // Categories
        const catNames = ["All", "T-Shirt", "Hoodie", "Other"];
        let catHtml = "";
        t.cats.forEach((c, i) => {
            const active = curCat === catNames[i] ? 'active' : '';
            catHtml += `<button class="cat-btn ${active}" onclick="filterCat(this, '${catNames[i]}')">${c}</button>`;
        });
        document.getElementById('ui-cat-bar').innerHTML = catHtml;

        // Modal Texts
        document.getElementById('ui-size-label').innerText = t.size;
        document.getElementById('ui-color-label').innerText = t.color;
        document.getElementById('ui-continue-btn').innerText = t.continue;
        document.getElementById('ui-close-btn').innerText = t.close;
        document.getElementById('ui-order-title').innerText = t.orderTitle;
        document.getElementById('orderName').placeholder = t.name;
        document.getElementById('orderPhone').placeholder = t.phone;
        document.getElementById('orderAddress').placeholder = t.addr;
        document.getElementById('ui-upload-btn').innerText = t.upload;
        document.getElementById('ui-submit-btn').innerText = t.submit;
        document.getElementById('ui-back-btn').innerText = t.back;

        render();
    }

    const firebaseConfig = { apiKey: "AIzaSyBI-5kPMdWzc3wsu-8gQYTGGJHGogE8_A0", databaseURL: "https://hnin-online-shop-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('products').on('value', snap => {
        prods = snap.val() || {};
        setLang(curLang);
        const s = document.getElementById('splash');
        if(s) { s.style.opacity = '0'; setTimeout(()=> s.style.display='none', 500); }
    }, () => {
        document.getElementById('splash').style.display='none';
    });

    function render() {
        let q = document.getElementById('search').value.toLowerCase();
        let h = "";
        for(let id in prods) {
            let p = prods[id];
            if ((q === "" || p.name.toLowerCase().includes(q)) && (curCat === "All" || (p.category || "").toLowerCase() === curCat.toLowerCase())) {
                h += `<div class="card" onclick="openDetail('${id}')">
                    <img src="${p.imgs[0]}">
                    <h3 style="font-size:14px; margin:10px 0 5px;">${p.name}</h3>
                    <div class="price-tag">${Number(p.price).toLocaleString()} MMK</div>
                    <button class="buy-btn" style="padding:8px; font-size:12px;">${translations[curLang].buy}</button>
                </div>`;
            }
        }
        document.getElementById('productGrid').innerHTML = h || "<p style='text-align:center;width:100%;color:#555;'>No Item Found</p>";
    }

    function filterCat(btn, cat) {
        curCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function openDetail(id) {
        selItem = prods[id]; selS = ""; selC = "";
        document.getElementById('detTitle').innerText = selItem.name;
        document.getElementById('detPrice').innerText = Number(selItem.price).toLocaleString() + " MMK";
        document.getElementById('detDesc').innerText = selItem.desc || "";
        document.getElementById('slider').innerHTML = selItem.imgs.map(img => `<img src="${img}">`).join('');
        
        let sizes = (selItem.sizes || "").toString().split(',').filter(x => x.trim());
        document.getElementById('sizeGroup').innerHTML = sizes.map(s => `<div class="opt-item" onclick="selS='${s.trim()}'; highlight(this)">${s.trim()}</div>`).join('');
        
        let colors = (selItem.colors || "").toString().split(',').filter(x => x.trim());
        document.getElementById('colorGroup').innerHTML = colors.map(c => `<div class="opt-item" onclick="selC='${c.trim()}'; highlight(this)">${c.trim()}</div>`).join('');
        
        document.getElementById('detailModal').style.display = 'flex';
    }

    function highlight(el) {
        el.parentElement.querySelectorAll('.opt-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function moveSlider(dir) {
        const s = document.getElementById('slider');
        s.scrollBy({ left: dir * s.clientWidth, behavior: 'smooth' });
    }

    function openOrder() {
        if(!selS || !selC) return showMsg(translations[curLang].selectErr);
        document.getElementById('detailModal').style.display = 'none';
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function selectPay(type) {
        selP = type;
        document.getElementById('payK').style.borderColor = (type==='KPay') ? "var(--primary)" : "#444";
        document.getElementById('payW').style.borderColor = (type==='Wave') ? "var(--primary)" : "#444";
        document.getElementById('qrSection').style.display = 'block';
        document.getElementById('qrImg').src = (type === 'KPay') ? "https://i.postimg.cc/YCHZd9SV/KPAY.jpg" : "https://i.postimg.cc/P5Qc9jL3/Wave.jpg";
    }

    function showMsg(msg) {
        const box = document.getElementById('customAlert');
        document.getElementById('alertMsg').innerText = msg;
        box.classList.add('show');
        setTimeout(() => box.classList.remove('show'), 3000);
    }

    async function sendOrder() {
        const n = document.getElementById('orderName').value, p = document.getElementById('orderPhone').value, a = document.getElementById('orderAddress').value, slip = document.getElementById('slipFile').files[0];
        if(!n || !p || !a || !selP || !slip) return showMsg(translations[curLang].fillErr);
        
        showMsg(curLang==='mm'?"တင်နေပါသည်...":"Sending...");

        const message = `🛍 New Order!\nItem: ${selItem.name}\nSize: ${selS}\nColor: ${selC}\nPrice: ${Number(selItem.price).toLocaleString()} MMK\nBuyer: ${n}\nPhone: ${p}\nAddr: ${a}`;
        
        const formData = new FormData();
        formData.append("chat_id", "7326800466");
        formData.append("photo", slip);
        formData.append("caption", message);

        try {
            await fetch(`https://api.telegram.org/bot8531584273:AAH0cO2A1Gr8dvX5uBjXa7sx0EwTVticn74/sendPhoto`, { method: 'POST', body: formData });
            showMsg(translations[curLang].success);
            setTimeout(() => location.reload(), 2000);
        } catch(e) { showMsg("Error!"); }
    }
</script>
</body>
</html>
